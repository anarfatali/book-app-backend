<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .otp-code {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            letter-spacing: 3px;
        }

        .warning {
            color: #dc3545;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Verify Your Email Address</h2>
    <p>Hello <span th:text="${name}">User</span>,</p>
    <p>Thank you for registering with BookApp! Please use the following verification code to complete your
        registration:</p>

    <div style="text-align: center; margin: 30px 0;">
        <p class="otp-code" th:text="${otp}">123456</p>
    </div>

    <p class="warning">This code will expire in <span th:text="${expiryMinutes}">15</span> minutes.</p>
    <p>If you didn't request this verification, please ignore this email.</p>

    <p>Best regards,<br>BookApp Team</p>
</div>
</body>
</html>
