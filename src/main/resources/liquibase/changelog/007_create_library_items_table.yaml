databaseChangeLog:
  - changeSet:
      id: 007_create_library_items_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: library_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: library_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: reading_status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: library_items
            baseColumnNames: library_id
            referencedTableName: library
            referencedColumnNames: id
            constraintName: fk_library_items_library_id
        - addForeignKeyConstraint:
            baseTableName: library_items
            baseColumnNames: book_id
            referencedTableName: book
            referencedColumnNames: id
            constraintName: fk_library_items_book_id
        - createIndex:
            indexName: idx_library_items_library_id
            tableName: library_items
            columns:
              - column:
                  name: library_id
        - createIndex:
            indexName: idx_library_items_book_id
            tableName: library_items
            columns:
              - column:
                  name: book_id
        - createIndex:
            indexName: idx_library_items_reading_status
            tableName: library_items
            columns:
              - column:
                  name: reading_status
