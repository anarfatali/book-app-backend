databaseChangeLog:
  - changeSet:
      id: 005_create_notifications_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: reference_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: is_read
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: notifications
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_notifications_user
        - createIndex:
            indexName: idx_notifications_user_id
            tableName: notifications
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_notifications_created_at
            tableName: notifications
            columns:
              - column:
                  name: created_at