databaseChangeLog:
  - changeSet:
      id: 020_create_post_likes_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: post_likes
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: post_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: post_likes
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_post_likes_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: post_likes
            baseColumnNames: post_id
            referencedTableName: posts
            referencedColumnNames: id
            constraintName: fk_post_likes_post
            onDelete: CASCADE
        - createIndex:
            indexName: idx_post_likes_user_id
            tableName: post_likes
            columns:
              - column: { name: user_id }
        - createIndex:
            indexName: idx_post_likes_post_id
            tableName: post_likes
            columns:
              - column: { name: post_id }
        - addUniqueConstraint:
            constraintName: uq_post_likes_user_post
            tableName: post_likes
            columnNames: user_id, post_id