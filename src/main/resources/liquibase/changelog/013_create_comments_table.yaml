databaseChangeLog:
  - changeSet:
      id: 013_create_comments_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: comments
            columns:
              - column:
                  name: id
                  type: BIGINT AUTO_INCREMENT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: post_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: parent_comment_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: comments
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_comments_user
        - addForeignKeyConstraint:
            baseTableName: comments
            baseColumnNames: post_id
            referencedTableName: posts
            referencedColumnNames: id
            constraintName: fk_comments_post
        - addForeignKeyConstraint:
            baseTableName: comments
            baseColumnNames: parent_comment_id
            referencedTableName: comments
            referencedColumnNames: id
            constraintName: fk_comments_parent
        - createIndex:
            indexName: idx_comments_post_id
            tableName: comments
            columns:
              - column:
                  name: post_id
        - createIndex:
            indexName: idx_comments_user_id
            tableName: comments
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_comments_created_at
            tableName: comments
            columns:
              - column:
                  name: created_at