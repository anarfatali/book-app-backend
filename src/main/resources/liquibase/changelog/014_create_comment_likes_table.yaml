databaseChangeLog:
  - changeSet:
      id: 014_create_comment_likes_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: comment_likes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: comment_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: comment_likes
            baseColumnNames: comment_id
            referencedTableName: comments
            referencedColumnNames: id
            constraintName: fk_comment_likes_comment
        - addForeignKeyConstraint:
            baseTableName: comment_likes
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_comment_likes_user
        - createIndex:
            indexName: idx_comment_likes_comment_id
            tableName: comment_likes
            columns:
              - column:
                  name: comment_id
        - createIndex:
            indexName: idx_comment_likes_user_id
            tableName: comment_likes
            columns:
              - column:
                  name: user_id