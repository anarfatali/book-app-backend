databaseChangeLog:
  - changeSet:
      id: 008_create_wishlists_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: wishlists
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: wishlists
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_wishlists_user
        - createIndex:
            tableName: wishlists
            indexName: idx_wishlists_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: wishlists
            indexName: idx_wishlists_name
            columns:
              - column:
                  name: name