databaseChangeLog:
  - changeSet:
      id: 015_create_follows_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: follows
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: follower_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: followee_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: follows
            baseColumnNames: follower_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_follows_follower_id
        - addForeignKeyConstraint:
            baseTableName: follows
            baseColumnNames: followee_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_follows_followee_id
        - createIndex:
            indexName: idx_follows_follower_id
            tableName: follows
            columns:
              - column:
                  name: follower_id
        - createIndex:
            indexName: idx_follows_followee_id
            tableName: follows
            columns:
              - column:
                  name: followee_id
        - createIndex:
            indexName: idx_follows_created_at
            tableName: follows
            columns:
              - column:
                  name: created_at