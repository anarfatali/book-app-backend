databaseChangeLog:
  - changeSet:
      id: 002_create_users_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                 name: role
                 type: VARCHAR(50)
                 constraints:
                   nullable: false
              - column:
                  name: verified
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: birthday
                  type: DATE
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: surname
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: subscription_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: reading_frequency
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: avatar_url
                  type: VARCHAR(500)
              - column:
                  name: bio
                  type: VARCHAR(500)
              - column:
                  name: reading_experience
                  type: VARCHAR(100)
              - column:
                  name: interests
                  type: VARCHAR(200)
              - column:
                  name: is_private
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: notification_preference
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false