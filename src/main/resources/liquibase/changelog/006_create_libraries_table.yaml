databaseChangeLog:
  - changeSet:
      id: 005_create_libraries_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: libraries
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: libraries
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_library_user
        - createIndex:
            indexName: idx_library_user_id
            tableName: libraries
            columns:
              - column:
                  name: user_id