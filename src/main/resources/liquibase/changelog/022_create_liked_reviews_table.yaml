databaseChangeLog:
  - changeSet:
      id: 022_create_liked_reviews_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: liked_reviews
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: review_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: liked_reviews
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_liked_reviews_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: liked_reviews
            baseColumnNames: review_id
            referencedTableName: reviews
            referencedColumnNames: id
            constraintName: fk_liked_reviews_review
            onDelete: CASCADE
        - createIndex:
            indexName: idx_liked_reviews_user_id
            tableName: liked_reviews
            columns:
              - column: { name: user_id }
        - createIndex:
            indexName: idx_liked_reviews_review_id
            tableName: liked_reviews
            columns:
              - column: { name: review_id }
        - addUniqueConstraint:
            constraintName: uq_liked_reviews_user_review
            tableName: liked_reviews
            columnNames: user_id, review_id