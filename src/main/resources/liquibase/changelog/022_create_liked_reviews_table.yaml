databaseChangeLog:
  - changeSet:
      id: 022_create_review_likes_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: review_likes
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: review_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: review_likes
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_review_likes_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: review_likes
            baseColumnNames: review_id
            referencedTableName: reviews
            referencedColumnNames: id
            constraintName: fk_review_likes_review
            onDelete: CASCADE
        - createIndex:
            indexName: idx_review_likes_user_id
            tableName: review_likes
            columns:
              - column: { name: user_id }
        - createIndex:
            indexName: idx_review_likes_review_id
            tableName: review_likes
            columns:
              - column: { name: review_id }
        - addUniqueConstraint:
            constraintName: uq_review_likes_user_review
            tableName: review_likes
            columnNames: user_id, review_id