databaseChangeLog:
  - changeSet:
      id: 003_create_audit_logs_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: audit_logs
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: entity_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: data
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: audit_logs
            baseColumnNames: user_id
            referencedTableName: user_entity
            referencedColumnNames: id
            constraintName: fk_audit_logs_user_id
        - createIndex:
            indexName: audit_log_user_id_idx
            tableName: audit_logs
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: audit_log_created_at_idx
            tableName: audit_logs
            columns:
              - column:
                  name: created_at
        - createIndex:
            indexName: audit_log_entity_idx
            tableName: audit_logs
            columns:
              - column:
                  name: entity_type
              - column:
                  name: entity_id