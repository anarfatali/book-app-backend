databaseChangeLog:
  - changeSet:
      id: 010_create_exchange_offers_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: exchange_offers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: condition
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: availability
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: is_approved
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: exchange_offers
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_exchange_offers_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: exchange_offers
            baseColumnNames: book_id
            referencedTableName: books
            referencedColumnNames: id
            constraintName: fk_exchange_offers_book
            onDelete: RESTRICT
        - createIndex:
            indexName: idx_offers_user_id
            tableName: exchange_offers
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_offers_book_id
            tableName: exchange_offers
            columns:
              - column:
                  name: book_id
        - createIndex:
            indexName: idx_offers_created_at
            tableName: exchange_offers
            columns:
              - column:
                  name: created_at

  - changeSet:
      id: 010_create_offer_photos_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: offer_photos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: offer_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: url
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: filename
                  type: VARCHAR(255)
              - column:
                  name: content_type
                  type: VARCHAR(100)
              - column:
                  name: size_bytes
                  type: BIGINT
              - column:
                  name: is_verified
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: admin_note
                  type: TEXT
              - column:
                  name: order_index
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: uploaded_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: offer_photos
            baseColumnNames: offer_id
            referencedTableName: exchange_offers
            referencedColumnNames: id
            constraintName: fk_offer_photos_offer
            onDelete: CASCADE
        - createIndex:
            indexName: idx_offer_photos_offer_id
            tableName: offer_photos
            columns:
              - column:
                  name: offer_id
        - createIndex:
            indexName: idx_offer_photos_is_verified
            tableName: offer_photos
            columns:
              - column:
                  name: is_verified
