databaseChangeLog:
  - changeSet:
      id: 017_create_likes_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: likes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: post_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: likes
            baseColumnNames: user_id
            referencedTableName: user
            referencedColumnNames: id
            constraintName: fk_likes_user
        - addForeignKeyConstraint:
            baseTableName: likes
            baseColumnNames: post_id
            referencedTableName: post
            referencedColumnNames: id
            constraintName: fk_likes_post
        - createIndex:
            indexName: idx_likes_post_id
            tableName: likes
            columns:
              - column:
                  name: post_id
        - createIndex:
            indexName: idx_likes_user_id
            tableName: likes
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_likes_created_at
            tableName: likes
            columns:
              - column:
                  name: created_at