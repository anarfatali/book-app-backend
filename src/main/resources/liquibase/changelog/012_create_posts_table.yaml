databaseChangeLog:
  - changeSet:
      id: 012_create_posts_table
      author: Anar Fataliyev
      changes:
        - createTable:
            tableName: posts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: caption
                  type: VARCHAR(1000)
              - column:
                  name: status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: approved_at
                  type: TIMESTAMP
              - column:
                  name: rejected_at
                  type: TIMESTAMP
              - column:
                  name: rejection_reason
                  type: VARCHAR(500)
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: posts
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_posts_user_id
        - createIndex:
            tableName: posts
            indexName: idx_posts_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: posts
            indexName: idx_posts_created_at
            columns:
              - column:
                  name: created_at
        - createIndex:
            tableName: posts
            indexName: idx_posts_status
            columns:
              - column:
                  name: status