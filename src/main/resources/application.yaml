spring:
  application:
    name: book-app-backend
  jpa:
    show_sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
#  liquibase:
#    enabled: true
#    change-log: classpath:liquibase/changelog-master.yaml
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 1234
  data:
    mongodb:
      uri: mongodb://mongo:1234@localhost:27017/bookapp?authSource=admin
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
    jwt:
      secret: ${JWT_SECRET}
      expiration-minutes: 15
      refresh-expiration-days: 7
  mail:
    host: smtp.gmail.com
    port: 587
    username: anarftliyev@gmail.com
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  thymeleaf:
    mode: HTML
    encoding: UTF-8
    cache: false
logging:
  level:
    org:
      springframework:
        web: DEBUG
        security: DEBUG