spring:
  application:
    name: book-app-backend
  jpa:
    show_sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
#  liquibase:
#    change-log: classpath:liquibase/changelog-master.yaml
  datasource:
    url: jdbc:postgresql://localhost:5432/book-app-backend
    username: postgres
    password: 1234
  data:
    mongodb:
      uri: mongodb://mongo:1234@localhost:27017/bookapp?authSource=admin
  security:
    jwt:
      secret: secret
      expiration-minutes: 15
      refresh-expiration-days: 7

minio:
  url: http://localhost:9000
  default-buckets: profile-photos
  access:
    name: "minioadmin"
    secret: "minioadmin"
    chunkSize: 10485760